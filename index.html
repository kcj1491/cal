<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공학용 계산기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calculator">
    <h1>공학용 계산기</h1>

    <div class="display">
      <input type="text" id="result" readonly />
    </div>

    <div class="buttons">
      <button class="function" onclick="clearDisplay()">AC</button>
      <button class="function" onclick="deleteLast()">DEL</button>
      <button class="operator" onclick="appendValue('(')">(</button>
      <button class="operator" onclick="appendValue(')')">)</button>

      <button class="science" onclick="appendFunction('sin')">sin</button>
      <button class="science" onclick="appendFunction('cos')">cos</button>
      <button class="science" onclick="appendFunction('tan')">tan</button>
      <button class="operator" onclick="appendValue('/')">÷</button>

      <button class="science" onclick="appendFunction('log')">log</button>
      <button class="science" onclick="appendFunction('ln')">ln</button>
      <button class="science" onclick="appendValue('Math.sqrt(')">√</button>
      <button class="operator" onclick="appendValue('*')">×</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('-')">−</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button class="science" onclick="appendValue('**')">xʸ</button>

      <button onclick="appendValue('0')">0</button>
      <button onclick="appendValue('.')">.</button>
      <button class="science" onclick="appendValue('Math.PI')">π</button>
      <button class="science" onclick="appendValue('Math.E')">e</button>

      <button class="equal" onclick="calculate()">=</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
